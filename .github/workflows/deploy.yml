name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'jurir-upgraded/src/**'
      - 'jurir-upgraded/public/**'
      - 'jurir-upgraded/index.html'
      - 'jurir-upgraded/vite.config.*'
      - 'jurir-upgraded/package.json'
      - 'jurir-upgraded/package-lock.json'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.sha }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        working-directory: jurir-upgraded
        run: npm ci

      - name: Build
        working-directory: jurir-upgraded
        run: npm run build
        env:
          VITE_JURIR_INTERNAL_KEY: ${{ secrets.JURIR_INTERNAL_KEY }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: jurir-upgraded/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
