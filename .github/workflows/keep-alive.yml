name: Keep Jurir Alive

on:
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Jurir
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://jurir-app-y4gz.onrender.com/health || echo "000")
          echo "Status: $STATUS"
