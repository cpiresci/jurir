name: Keep Jusaii Alive

on:
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Jusaii
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://jusaii-app-daqr.onrender.com/health || echo "000")
          echo "Status: $STATUS"
