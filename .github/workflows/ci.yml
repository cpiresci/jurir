name: CI Frontend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (falha se houver erro de sintaxe/import)
        run: npm run build

      - name: Upload dist (artefato, apenas inspeção)
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 3
