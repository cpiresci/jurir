    <meta charset="UTF-8" />

    <title>JURIR — Inteligência Jurídica por IA</title>

    <!-- [og-meta-static] Tags estáticas pra preview ao compartilhar (WhatsApp,
         Telegram, Facebook, LinkedIn etc.) — esses crawlers NÃO executam JS,
         então precisam achar isso direto no HTML puro. O título/descrição
         dinâmicos que useDocumentMeta seta por página (ex: posts do blog)
         funcionam pra <title> da aba e pro Google (que renderiza JS), mas
         NUNCA aparecem em preview de link compartilhado — por isso essas
         tags aqui cobrem o caso genérico (home/produto), que é o que a
         maioria dos compartilhamentos vai usar. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="JURIR" />
    <meta property="og:title" content="JURIR — Inteligência Jurídica por IA" />
    <meta property="og:description" content="16 agentes de IA especializados analisam seu caso em paralelo. Análise jurídica com veredito, JURIR Score e citações verificadas de legislação real." />

    <meta property="og:image:height" content="630" />
